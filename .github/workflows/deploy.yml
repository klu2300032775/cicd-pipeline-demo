name: Secure CI/CD Pipeline (Docker + Trivy + Deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install Dependencies
        run: npm install --only=production

      # 3. Build Docker image locally (for Trivy scan)
      - name: Build Docker Image
        run: docker build -t cicd-pipeline-demo:latest .

      # 4. Trivy security scan — FAILS if HIGH/CRITICAL CVEs found
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cicd-pipeline-demo:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # 5. Deploy to Render.com (Render pulls from GitHub and builds itself)
      - name: Deploy to Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys
